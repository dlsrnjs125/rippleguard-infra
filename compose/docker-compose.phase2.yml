name: ${COMPOSE_PROJECT_NAME:-rippleguard}

services:
  kafka-init:
    environment:
      KAFKA_TOPICS_FILE: /topics/phase2-events.txt

  audit-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AUDIT_POSTGRES_DB:-rippleguard_audit}
      POSTGRES_USER: ${AUDIT_POSTGRES_USER:-rippleguard_audit}
      POSTGRES_PASSWORD: ${AUDIT_POSTGRES_PASSWORD:?AUDIT_POSTGRES_PASSWORD is required}
    ports:
      - "${AUDIT_POSTGRES_PORT:-5435}:5432"
    volumes:
      - audit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - rippleguard-platform

  agent-runtime:
    image: ${AGENT_RUNTIME_IMAGE:?AGENT_RUNTIME_IMAGE is required}
    environment:
      CONTRACTS_ROOT: /app/contracts
      MODEL_MANIFEST_PATH: /app/artifacts/manifests/phase2-loan-xgboost.v1.0.0.json
      MODEL_ARTIFACT_ROOT: /app/artifacts/models
      HOST: 0.0.0.0
      PORT: "8080"
      LOG_LEVEL: ${AGENT_RUNTIME_LOG_LEVEL:?AGENT_RUNTIME_LOG_LEVEL is required}
    ports:
      - "${AGENT_RUNTIME_PORT:?AGENT_RUNTIME_PORT is required}:8080"
    volumes:
      - ${RIPPLEGUARD_CONTRACTS_REPO:?RIPPLEGUARD_CONTRACTS_REPO is required}:/app/contracts:ro
      - ${RIPPLEGUARD_AGENT_RUNTIME_REPO:?RIPPLEGUARD_AGENT_RUNTIME_REPO is required}/artifacts/manifests:/app/artifacts/manifests:ro
      - ${RIPPLEGUARD_AGENT_RUNTIME_REPO:?RIPPLEGUARD_AGENT_RUNTIME_REPO is required}/artifacts/models:/app/artifacts/models:ro
    healthcheck:
      test: ["CMD", "python", "-m", "rippleguard_agent_runtime.app.readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - rippleguard-platform

  loan-service:
    image: ${LOAN_SERVICE_IMAGE:?LOAN_SERVICE_IMAGE is required}
    depends_on:
      kafka:
        condition: service_healthy
      loan-postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://loan-postgres:5432/${LOAN_POSTGRES_DB:-rippleguard_loan}
      DB_USERNAME: ${LOAN_POSTGRES_USER:-rippleguard_loan}
      DB_PASSWORD: ${LOAN_POSTGRES_PASSWORD:?LOAN_POSTGRES_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OUTBOX_PUBLISHER_DELAY_MS: ${OUTBOX_PUBLISHER_DELAY_MS:-1000}
      OUTBOX_INSTANCE_ID: loan-service-phase2
      INTERNAL_API_SERVICE_TOKEN: ${INTERNAL_API_SERVICE_TOKEN:?INTERNAL_API_SERVICE_TOKEN is required}
    ports:
      - "${LOAN_SERVICE_PORT:-18081}:8080"
    networks:
      - rippleguard-platform

  governance-service:
    image: ${GOVERNANCE_SERVICE_IMAGE:?GOVERNANCE_SERVICE_IMAGE is required}
    depends_on:
      kafka:
        condition: service_healthy
      governance-postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      agent-runtime:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://governance-postgres:5432/${GOVERNANCE_POSTGRES_DB:-rippleguard_governance}
      DB_USERNAME: ${GOVERNANCE_POSTGRES_USER:-rippleguard_governance}
      DB_PASSWORD: ${GOVERNANCE_POSTGRES_PASSWORD:?GOVERNANCE_POSTGRES_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OUTBOX_PUBLISHER_DELAY_MS: ${OUTBOX_PUBLISHER_DELAY_MS:-1000}
      OUTBOX_INSTANCE_ID: governance-service-phase2
      CONTRACTS_ROOT: /app/contracts
      AGENT_RUNTIME_BASE_URL: http://agent-runtime:8080
      AGENT_RUNTIME_LOAN_DECISION_RUNS_PATH: ${AGENT_RUNTIME_LOAN_DECISION_RUNS_PATH:?AGENT_RUNTIME_LOAN_DECISION_RUNS_PATH is required}
      AGENT_RUNTIME_CONNECT_TIMEOUT: ${AGENT_RUNTIME_CONNECT_TIMEOUT:?AGENT_RUNTIME_CONNECT_TIMEOUT is required}
      AGENT_RUNTIME_RESPONSE_TIMEOUT: ${AGENT_RUNTIME_RESPONSE_TIMEOUT:?AGENT_RUNTIME_RESPONSE_TIMEOUT is required}
      AGENT_RUNTIME_MAX_ATTEMPTS: ${AGENT_RUNTIME_MAX_ATTEMPTS:?AGENT_RUNTIME_MAX_ATTEMPTS is required}
      AGENT_RUNTIME_REQUEST_TIMEOUT: ${AGENT_RUNTIME_REQUEST_TIMEOUT:?AGENT_RUNTIME_REQUEST_TIMEOUT is required}
      AGENT_RUNTIME_RETRY_BACKOFF: ${AGENT_RUNTIME_RETRY_BACKOFF:?AGENT_RUNTIME_RETRY_BACKOFF is required}
      AGENT_RUNTIME_LEASE_DURATION: ${AGENT_RUNTIME_LEASE_DURATION:?AGENT_RUNTIME_LEASE_DURATION is required}
      AGENT_RUNTIME_RECOVERY_DELAY_MS: ${AGENT_RUNTIME_RECOVERY_DELAY_MS:?AGENT_RUNTIME_RECOVERY_DELAY_MS is required}
      AGENT_RUNTIME_MAX_RESPONSE_BYTES: ${AGENT_RUNTIME_MAX_RESPONSE_BYTES:?AGENT_RUNTIME_MAX_RESPONSE_BYTES is required}
      PHASE2_EXECUTION_PLAN_VERSION: ${PHASE2_EXECUTION_PLAN_VERSION:?PHASE2_EXECUTION_PLAN_VERSION is required}
      PHASE2_FEATURE_SCHEMA_VERSION: ${PHASE2_FEATURE_SCHEMA_VERSION:?PHASE2_FEATURE_SCHEMA_VERSION is required}
      PHASE2_PREPROCESSING_VERSION: ${PHASE2_PREPROCESSING_VERSION:?PHASE2_PREPROCESSING_VERSION is required}
      PHASE2_MODEL_VERSION: ${PHASE2_MODEL_VERSION:?PHASE2_MODEL_VERSION is required}
      PHASE2_MODEL_ARTIFACT_DIGEST: ${PHASE2_MODEL_ARTIFACT_DIGEST:?PHASE2_MODEL_ARTIFACT_DIGEST is required}
      PHASE2_THRESHOLD_VERSION: ${PHASE2_THRESHOLD_VERSION:?PHASE2_THRESHOLD_VERSION is required}
    ports:
      - "${GOVERNANCE_SERVICE_PORT:-18082}:8080"
    volumes:
      - ${RIPPLEGUARD_CONTRACTS_REPO:?RIPPLEGUARD_CONTRACTS_REPO is required}:/app/contracts:ro
    networks:
      - rippleguard-platform

  audit-replay-service:
    image: ${AUDIT_SERVICE_IMAGE:?AUDIT_SERVICE_IMAGE is required}
    depends_on:
      kafka:
        condition: service_healthy
      audit-postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://audit-postgres:5432/${AUDIT_POSTGRES_DB:-rippleguard_audit}
      DB_USERNAME: ${AUDIT_POSTGRES_USER:-rippleguard_audit}
      DB_PASSWORD: ${AUDIT_POSTGRES_PASSWORD:?AUDIT_POSTGRES_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${AUDIT_SERVICE_PORT:-18083}:8080"
    networks:
      - rippleguard-platform

volumes:
  audit-postgres-data:
