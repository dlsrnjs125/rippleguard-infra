name: phase1-infra-validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make validate-static
      - run: python3 scripts/validate-phase1-manifest.py
      - run: python3 scripts/check-topic-contracts.py
      - run: ./scripts/check-secrets.sh
      - run: make validate-contract-baseline
